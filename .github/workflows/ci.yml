name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: saas_tracker_ci
          POSTGRES_USER: saas
          POSTGRES_PASSWORD: saas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saas -d saas_tracker_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: jdbc:postgresql://localhost:5432/saas_tracker_ci
      DATABASE_USER: saas
      DATABASE_PASSWORD: saas
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-super-secret-please-change
      CORS_ALLOWED_ORIGINS: http://localhost:4200
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test integrationTest --no-daemon

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test -- --runInBand

  api-tests:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      RATE_LIMIT_RPM: "10000"
      AUTH_RATE_LIMIT_RPM: "10000"
      EXPORT_RATE_LIMIT_RPM: "100"
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: |
          cp .env.example .env
          sed -i 's/change-me-db-user/saas/g' .env
          sed -i 's/change-me-db-password/saas/g' .env
          sed -i 's/change-me-super-long-jwt-secret-at-least-32-bytes/ci-jwt-secret-at-least-32-bytes-long/g' .env
          sed -i 's/change-me-stalwart-password/ci-stalwart-password/g' .env

      - name: Start application stack
        run: docker compose up -d --wait
        timeout-minutes: 5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-tests/package-lock.json

      - name: Install dependencies
        working-directory: api-tests
        run: npm ci

      - name: Run API tests
        working-directory: api-tests
        run: |
          cp .env.test.example .env.test
          npm run test:ci

      - name: Stop stack
        if: always()
        run: docker compose down
