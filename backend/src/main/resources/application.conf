ktor {
  deployment {
    host = "0.0.0.0"
    port = 8080
    host = ${?APP_HOST}
    port = ${?APP_PORT}
  }
  application {
    modules = [ com.saastracker.ApplicationKt.module ]
  }
}

app {
  env = "local"
  env = ${?APP_ENV}

  database {
    jdbcUrl = "jdbc:postgresql://localhost:5432/saas_tracker"
    username = "saas"
    password = "saas"
    maxPoolSize = 10
    jdbcUrl = ${?DATABASE_URL}
    username = ${?DATABASE_USER}
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = ${?DATABASE_MAX_POOL_SIZE}
  }

  redis {
    uri = "redis://localhost:6379"
    cacheTtlSeconds = 900
    uri = ${?REDIS_URL}
    cacheTtlSeconds = ${?REDIS_CACHE_TTL_SECONDS}
  }

  jwt {
    issuer = "saas-subscription-tracker"
    audience = "saas-subscription-tracker-users"
    secret = ${?JWT_SECRET}
    accessTokenTtlMinutes = 15
    refreshTokenTtlDays = 30
    issuer = ${?JWT_ISSUER}
    audience = ${?JWT_AUDIENCE}
    accessTokenTtlMinutes = ${?JWT_ACCESS_TTL_MINUTES}
    refreshTokenTtlDays = ${?JWT_REFRESH_TTL_DAYS}
  }

  email {
    provider = "smtp"
    provider = ${?EMAIL_PROVIDER}
  }

  smtp {
    host = "stalwart"
    port = 587
    username = "admin"
    password = ""
    fromEmail = "no-reply@localhost"
    fromName = "SaaS Subscription Tracker"
    auth = true
    startTls = false
    tlsTrustAll = false
    timeoutMs = 10000
    host = ${?SMTP_HOST}
    port = ${?SMTP_PORT}
    username = ${?SMTP_USERNAME}
    password = ${?SMTP_PASSWORD}
    fromEmail = ${?SMTP_FROM_EMAIL}
    fromName = ${?SMTP_FROM_NAME}
    auth = ${?SMTP_AUTH}
    startTls = ${?SMTP_STARTTLS}
    tlsTrustAll = ${?SMTP_TLS_TRUST_ALL}
    timeoutMs = ${?SMTP_TIMEOUT_MS}
  }

  resend {
    apiKey = ${?RESEND_API_KEY}
    fromEmail = "alerts@example.com"
    baseUrl = "https://api.resend.com"
    fromEmail = ${?RESEND_FROM_EMAIL}
    baseUrl = ${?RESEND_BASE_URL}
  }

  stripe {
    apiKey = ${?STRIPE_SECRET_KEY}
    webhookSecret = ${?STRIPE_WEBHOOK_SECRET}
    monthlyPriceId = ${?STRIPE_MONTHLY_PRICE_ID}
    annualPriceId = ${?STRIPE_ANNUAL_PRICE_ID}
    successUrl = ${?STRIPE_SUCCESS_URL}
    cancelUrl = ${?STRIPE_CANCEL_URL}
  }

  scheduler {
    renewalCron = "0 0 9 * * ?"
    renewalCron = ${?RENEWAL_CRON}
  }

  rateLimit {
    requestsPerMinute = 120
    requestsPerMinute = ${?RATE_LIMIT_RPM}
    authRequestsPerMinute = 10
    authRequestsPerMinute = ${?AUTH_RATE_LIMIT_RPM}
  }

  cors {
    allowedOrigins = "http://localhost:4200"
    allowedOrigins = ${?CORS_ALLOWED_ORIGINS}
  }

  frontend {
    baseUrl = "http://localhost"
    baseUrl = ${?FRONTEND_BASE_URL}
  }
}
