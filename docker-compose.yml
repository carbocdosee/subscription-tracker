services:
  postgres:
    image: postgres:16
    container_name: saas_tracker_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: saas_tracker_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  # ============================================================
  # LOCAL DEVELOPMENT ONLY — do not use in production without
  # configuring DKIM/SPF (emails will go to spam).
  # In production, use Resend or another SMTP provider instead.
  # ============================================================
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: saas_tracker_stalwart
    restart: unless-stopped
    volumes:
      - stalwart_data:/opt/stalwart
    healthcheck:
      test: ["CMD-SHELL", "test -f /opt/stalwart/etc/config.toml"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "${STALWART_HTTP_PORT:-8081}:8080"
      - "${STALWART_SUBMISSION_PORT:-2525}:587"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas_tracker_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      SMTP_AUTH: ${SMTP_AUTH}
      SMTP_STARTTLS: ${SMTP_STARTTLS}
      SMTP_TLS_TRUST_ALL: ${SMTP_TLS_TRUST_ALL}
      SMTP_TIMEOUT_MS: ${SMTP_TIMEOUT_MS}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_BASE_URL: ${RESEND_BASE_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_MONTHLY_PRICE_ID: ${STRIPE_MONTHLY_PRICE_ID}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM}
      AUTH_RATE_LIMIT_RPM: ${AUTH_RATE_LIMIT_RPM}
      EXPORT_RATE_LIMIT_RPM: ${EXPORT_RATE_LIMIT_RPM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      stalwart:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas_tracker_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    container_name: saas_tracker_gateway
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
  stalwart_data:
